apiVersion: apps/v1
kind: Deployment
metadata:
  name: mini-shop-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mini-shop
  template:
    metadata:
      labels:
        app: mini-shop
    spec:
      containers:
        - name: mini-shop-api
          image: ghcr.io/USERNAME/mini-shop-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
